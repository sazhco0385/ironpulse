kind = "mobile"
previewPath = "/"
title = "FitPro - Muscle Builder"
version = "1.0.0"
id = "artifacts/fitness-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22335

[services.development]
run = "pnpm --filter @workspace/fitness-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fitness-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/fitness-app", "run", "serve" ]

[services.env]
PORT = "22335"
BASE_PATH = "/"
